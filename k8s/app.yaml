apiVersion: v1
kind: Namespace
metadata:
  name: flight-booking
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: flight-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: your-registry/flight-booking/user-service:1.0
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: flight-booking
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
---
