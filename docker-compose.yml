services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      ORACLE_PASSWORD: oraclepwd
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - ./oracle-init:/container-entrypoint-initdb.d
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "/opt/oracle/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - flight-booking

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - flight-booking

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 | grep -q ApiVersion || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - flight-booking

  # Zipkin for distributed tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    networks:
      - flight-booking

  # Elasticsearch for centralized logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - flight-booking

  # Logstash for log processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    networks:
      - flight-booking

  # # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"}'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - flight-booking

  # # Filebeat for shipping logs
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: filebeat
    user: root
    command: ["--strict.perms=false", "-e"]
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_started
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - service-logs:/var/log/app:ro
    networks:
      - flight-booking

  user-service:
    build:
      context: ./backend/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      oracle:
        condition: service_healthy
    restart: on-failure
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - service-logs:/var/log/app
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - flight-booking

  product-service:
    build:
      context: ./backend/product-service
    container_name: product-service
    ports:
      - "8082:8082"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - service-logs:/var/log/app
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8082'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - flight-booking

  order-service:
    build:
      context: ./backend/order-service
    container_name: order-service
    ports:
      - "8083:8083"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    restart: on-failure
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - service-logs:/var/log/app
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - flight-booking

  notification-service:
    build:
      context: ./backend/notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      oracle:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: on-failure
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - service-logs:/var/log/app
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8084'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - flight-booking

  gateway:
    build:
      context: ./backend/gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      notification-service:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - service-logs:/var/log/app
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - flight-booking

  frontend:
    build:
      context: ./frontend
    container_name: microservice-frontend
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - flight-booking

volumes:
  oracle-data:
  es-data:
  service-logs:
    driver: local

networks:
  flight-booking:
    driver: bridge
