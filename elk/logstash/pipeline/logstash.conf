input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON from log message if not already parsed
  if [message] and [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }

  # Extract service name - Filebeat already adds [fields][application]
  if [fields][application] {
    mutate {
      add_field => { "service_name" => "%{[fields][application]}" }
    }
  }

  # Parse nested parsed JSON from Filebeat's ndjson parser
  if [parsed][service] {
    mutate {
      add_field => { "service_name" => "%{[parsed][service]}" }
    }
  }

  # Copy common fields from parsed JSON
  if [parsed] {
    if [parsed][message] {
      mutate {
        copy => { "[parsed][message]" => "log_message" }
      }
    }
    if [parsed][level] or [parsed][@level] {
      mutate {
        copy => { "[parsed][level]" => "log_level" }
        copy => { "[parsed][@level]" => "log_level" }
      }
    }
    if [parsed][logger] or [parsed][logger_name] {
      mutate {
        copy => { "[parsed][logger]" => "logger_name" }
        copy => { "[parsed][logger_name]" => "logger_name" }
      }
    }
    if [parsed][traceId] {
      mutate {
        copy => { "[parsed][traceId]" => "trace_id" }
      }
    }
    if [parsed][spanId] {
      mutate {
        copy => { "[parsed][spanId]" => "span_id" }
      }
    }
    if [parsed][@timestamp] {
      date {
        match => [ "[parsed][@timestamp]", "ISO8601" ]
        target => "@timestamp"
      }
    }
  }

  # Default service name if not detected
  if ![service_name] or [service_name] == "%{[fields][application]}" {
    mutate {
      replace => { "service_name" => "unknown" }
    }
  }

  # Remove internal fields
  mutate {
    remove_field => [ "parsed", "message" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "flight-booking-%{service_name}-%{+YYYY.MM.dd}"
    manage_template => false
  }
  stdout {
    codec => rubydebug
  }
}