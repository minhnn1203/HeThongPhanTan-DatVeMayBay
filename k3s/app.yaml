# OpenSearch (replaces Elasticsearch - free fork, public Docker Hub images)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: flight-booking
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
          securityContext:
            runAsUser: 0
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.12.0
          ports:
            - containerPort: 9200
              name: rest
            - containerPort: 9600
              name: perf
          env:
            - name: discovery.type
              value: single-node
            - name: plugins.security.disabled
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 1.5Gi
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: flight-booking
spec:
  selector:
    app: opensearch
  ports:
    - name: rest
      port: 9200
      targetPort: 9200
    - name: perf
      port: 9600
      targetPort: 9600
---
# OpenSearch Dashboards (replaces Kibana - free, public Docker Hub images)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: flight-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:2.12.0
          ports:
            - containerPort: 5601
          env:
            - name: OPENSEARCH_HOSTS
              value: '["http://opensearch:9200"]'
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: flight-booking
spec:
  type: NodePort
  selector:
    app: opensearch-dashboards
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 30561
---
# Fluent Bit ConfigMap - ships logs directly to OpenSearch (no Logstash for home lab)
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: flight-booking
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Log_Level    info

    [INPUT]
        Name              tail
        Tag               user-service
        Path              /var/log/app/user-service*.log
        Read_from_Head    true
        DB                /tmp/flb_user_service.db

    [INPUT]
        Name              tail
        Tag               product-service
        Path              /var/log/app/flight-service*.log
        Read_from_Head    true
        DB                /tmp/flb_product_service.db

    [INPUT]
        Name              tail
        Tag               order-service
        Path              /var/log/app/order-service*.log
        Read_from_Head    true
        DB                /tmp/flb_order_service.db

    [INPUT]
        Name              tail
        Tag               notification-service
        Path              /var/log/app/email-service*.log
        Read_from_Head    true
        DB                /tmp/flb_notification_service.db

    [INPUT]
        Name              tail
        Tag               api-gateway
        Path              /var/log/app/api-gateway*.log
        Read_from_Head    true
        DB                /tmp/flb_api_gateway.db

    [FILTER]
        Name              record_modifier
        Match             user-service
        Record            application user-service

    [FILTER]
        Name              record_modifier
        Match             product-service
        Record            application product-service

    [FILTER]
        Name              record_modifier
        Match             order-service
        Record            application order-service

    [FILTER]
        Name              record_modifier
        Match             notification-service
        Record            application notification-service

    [FILTER]
        Name              record_modifier
        Match             api-gateway
        Record            application api-gateway

    [OUTPUT]
        Name              es
        Match             user-service
        Host              opensearch
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   flight-booking-user-service
        Logstash_DateFormat %Y.%m.%d
        Suppress_Type_Name On
        Trace_Error       On

    [OUTPUT]
        Name              es
        Match             product-service
        Host              opensearch
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   flight-booking-product-service
        Logstash_DateFormat %Y.%m.%d
        Suppress_Type_Name On
        Trace_Error       On

    [OUTPUT]
        Name              es
        Match             order-service
        Host              opensearch
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   flight-booking-order-service
        Logstash_DateFormat %Y.%m.%d
        Suppress_Type_Name On
        Trace_Error       On

    [OUTPUT]
        Name              es
        Match             notification-service
        Host              opensearch
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   flight-booking-notification-service
        Logstash_DateFormat %Y.%m.%d
        Suppress_Type_Name On
        Trace_Error       On

    [OUTPUT]
        Name              es
        Match             api-gateway
        Host              opensearch
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   flight-booking-api-gateway
        Logstash_DateFormat %Y.%m.%d
        Suppress_Type_Name On
        Trace_Error       On
---
# Fluent Bit Deployment - reads logs from backend services and ships to OpenSearch
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebeat
  namespace: flight-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      containers:
        - name: filebeat
          image: fluent/fluent-bit:2.2
          args: ["-c", "/fluent-bit/etc/fluent-bit.conf"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: filebeat-config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              readOnly: true
              subPath: fluent-bit.conf
            - name: service-logs
              mountPath: /var/log/app
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: filebeat-config
          configMap:
            name: filebeat-config
        - name: service-logs
          hostPath:
            path: /tmp/flight-logs
