  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ngocminh123/user-service:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: default
          volumeMounts:
